<div class="login-container d-flex align-items-center justify-content-center" style="height: 100vh; background: #121214;">

  <div class="container row bg-dark p-5 rounded shadow-lg text-white" style="max-width: 900px;">
    
    <!-- LADO ESQUERDO: StudyFlow -->
    <div class="col-md-6 d-flex flex-column align-items-center justify-content-center border-end border-secondary pe-md-5 mb-4 mb-md-0">
      <div class="display-1 text-success mb-3">
        <i class="bi bi-journal-bookmark-fill">🚀</i>
      </div>
      <h1 class="fw-bold text-success">StudyFlow</h1>
      <p class="text-muted text-center">Organize suas matérias, metas e evolua nos seus estudos diários.</p>
    </div>

    <!-- LADO DIREITO: Formuário de Acesso -->
    <div class="col-md-6 ps-md-5 d-flex flex-column justify-content-center">
      <h2 class="fw-semibold mb-4">Boas-vindas</h2>

      <div class="mb-3">
        <label class="form-label text-light">Usuário</label>
        <input
          type="text"
          class="form-control bg-secondary text-white border-0"
          placeholder="Insira seu usuário de estudante"
          [(ngModel)]="nome">
      </div>

      <div class="mb-3">
        <label class="form-label text-light">Senha</label>
        <input
          type="password"
          class="form-control bg-secondary text-white border-0"
          placeholder="Insira sua senha"
          [(ngModel)]="senha">
      </div>

      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="lembrar">
        <label class="form-check-label text-muted" for="lembrar">
          Manter conectado
        </label>
      </div>

      <!-- TRAVA DA LGPD -->
      <div class="form-check mb-4">
        <input
          class="form-check-input"
          type="checkbox"
          id="lgpd"
          [(ngModel)]="aceitouTermos">
        <label class="form-check-label text-success fw-bold" for="lgpd">
          Aceito os termos de privacidade (LGPD)
        </label>
      </div>

      <div *ngIf="erroLogin" class="alert alert-danger p-2 small">
        {{ erroLogin }}
      </div>

      <button
        class="btn btn-success w-100 fw-bold py-2"
        (click)="entrar()"
        [disabled]="!aceitouTermos">
        Entrar no Painel
      </button>
    </div>

  </div>

</div>
